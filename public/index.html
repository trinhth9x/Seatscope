<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seatscope</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/chart.umd.min.js"></script>
    <script src="vendor/xlsx.full.min.js"></script>
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">◆</div>
          <div class="brand-text">Seat<span>scope</span></div>
        </div>
        <nav class="nav">
          <a class="nav-item active" data-section="overview"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="6" height="6" rx="1.5"/><rect x="14" y="4" width="6" height="6" rx="1.5"/><rect x="4" y="14" width="6" height="6" rx="1.5"/><rect x="14" y="14" width="6" height="6" rx="1.5"/></svg></span> Overview</a>
          <a class="nav-item" data-section="users"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M7.5 18.5c.5-2.4 2.5-4 4.5-4s4 1.6 4.5 4"/><circle cx="12" cy="9" r="3.2"/></svg></span> Users</a>
          <a class="nav-item" data-section="waste"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4.5 19 18H5l7-13.5Z"/><path d="M12 9v4.5"/><circle cx="12" cy="16.4" r=".8" fill="currentColor" stroke="none"/></svg></span> Wasted licenses</a>
          <a class="nav-item" data-section="inactive"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="7.5"/><path d="M12 8v4l2.7 2.2"/></svg></span> Inactive users</a>
          <a class="nav-item" data-section="renewals"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8.5V4.8h-3.7"/><path d="M18 8.5A6.8 6.8 0 1 0 19 12"/></svg></span> Renewals</a>
          <a class="nav-item" data-section="licenses"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M7 7.5h10"/><path d="M7 12h10"/><path d="M7 16.5h6"/><rect x="4" y="4" width="16" height="16" rx="2.5"/></svg></span> License types</a>
          <a class="nav-item" data-section="connectors"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M8 9.5h3"/><path d="M13 14.5h3"/><path d="M11 12h2"/><path d="M7 7a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M17 13a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/></svg></span> Connectors</a>
        </nav>
        <div class="sidebar-foot">
          <div class="src-badge" id="srcBadge">…</div>
          <div class="muted small" id="genAt"></div>
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Overview</h1>
            <p class="muted small" id="pageSub">License usage, cost & waste across all connected services</p>
          </div>
          <button class="btn" id="refreshBtn">↻ Refresh</button>
        </header>

        <div id="content"><div class="loading">Loading…</div></div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
